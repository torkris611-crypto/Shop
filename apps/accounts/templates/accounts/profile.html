{% extends 'base.html' %}

{% block title %}Личный кабинет - TopStore{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    {% if user.profile.avatar %}
                        <img src="{{ user.profile.avatar.url }}" class="rounded-circle mb-3" width="100" height="100">
                    {% else %}
                        <i class="fas fa-user-circle fa-5x mb-3"></i>
                    {% endif %}
                    <h5>{{ user.username }}</h5>
                    <p class="text-muted">{{ user.email }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h4>Мой профиль</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data" action="{% url 'accounts:update_profile' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" class="form-control" name="last_name" value="{{ user.last_name }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Телефон</label>
                            <input type="tel" class="form-control" name="phone" value="{{ user.profile.phone }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Город</label>
                            <input type="text" class="form-control" name="city" value="{{ user.profile.city }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Адрес</label>
                            <textarea class="form-control" name="address" rows="3">{{ user.profile.address }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Аватар</label>
                            <input type="file" class="form-control" name="avatar">
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
