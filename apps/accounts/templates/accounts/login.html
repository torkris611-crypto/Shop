{% extends 'base.html' %}
{% load static %}

{% block title %}Вход - TopStore{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card" style="background: rgba(20,20,40,0.8); border: 1px solid rgba(156,39,176,0.3);">
                <div class="card-header bg-transparent border-primary text-center">
                    <h3 class="mb-0" style="color: #9c27b0;">
                        <i class="fas fa-sign-in-alt"></i> Вход
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label" style="color: #ffffff;">Имя пользователя</label>
                            <input type="text" name="username" id="id_username" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(156,39,176,0.3); color: #ffffff;" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label" style="color: #ffffff;">Пароль</label>
                            <input type="password" name="password" id="id_password" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(156,39,176,0.3); color: #ffffff;" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                    </form>

                    <hr class="my-4" style="border-color: rgba(156,39,176,0.3);">

                    <p class="text-center mb-0" style="color: #ffffff;">
                        Нет аккаунта?
                        <a href="{% url 'accounts:register' %}" class="text-decoration-none" style="color: #9c27b0;">
                            Зарегистрироваться
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
